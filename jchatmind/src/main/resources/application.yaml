spring:
  application:
    name: flowcopilot
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email
    password: your-password # 邮箱授权码
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
mybatis:
  type-aliases-package: aliang.flowcopilot.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: aliang.flowcopilot.typehandler

flowcopilot:
  llm:
    providers:
      deepseek:
        enabled: true
        api-key: ${DEEPSEEK_API_KEY:sk-44f22531ae9f477c951f75f2327c3d9f}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        model: ${DEEPSEEK_MODEL:deepseek-chat}
        timeout: 60s
        log-requests: false
        log-responses: false
      zhipu:
        enabled: false
        api-key: ${ZHIPU_API_KEY:}
        base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
        model: ${ZHIPU_MODEL:glm-4.6}
        timeout: 60s
        log-requests: false
        log-responses: false
  observability:
    enabled: true
    persist-enabled: true
    otel-enabled: ${FLOWCOPILOT_OTEL_ENABLED:false}
    service-name: ${FLOWCOPILOT_OBSERVABILITY_SERVICE_NAME:flowcopilot}
    external-trace-base-url: ${FLOWCOPILOT_EXTERNAL_TRACE_BASE_URL:}
    otel-endpoint: ${FLOWCOPILOT_OTEL_ENDPOINT:}
    otel-timeout: 10s
    langsmith:
      enabled: ${FLOWCOPILOT_LANGSMITH_ENABLED:false}
      endpoint: ${FLOWCOPILOT_LANGSMITH_ENDPOINT:https://api.smith.langchain.com/otel/v1/traces}
      api-key: ${FLOWCOPILOT_LANGSMITH_API_KEY:}
      project: ${FLOWCOPILOT_LANGSMITH_PROJECT:}

document:
  storage:
    base-path: ./data/documents
